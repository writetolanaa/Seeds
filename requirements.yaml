packages:
  "framer-motion": "Smooth page transitions, character bobbing, and game juice"
  "canvas-confetti": "Celebration effects upon completing a zone puzzle"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes safely"

images:
  - path: "artifacts/sdg-game/public/images/parchment-bg.png"
    description: "A seamless texture of warm, slightly aged creamy parchment paper, perfect for a hand-drawn fantasy map background, very subtle variations."
    aspect_ratio: "16:9"
  - path: "artifacts/sdg-game/public/images/title-illustration.png"
    description: "Cute hand-drawn illustration of a broken world floating on islands on the left, and a bright green blooming world on the right, sketch style, ink outlines, watercolor pastels."
    aspect_ratio: "16:9"

notes:
  - "This is a pure frontend offline game. State is persisted in localStorage."
  - "No backend API routes are implemented or required."
  - "Using wouter for client-side routing between game scenes."
